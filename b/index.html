    *{margin:0;padding:0;box-sizing:border-box}html,body{overflow-x: hidden;}body{background:#F4F0EC}main{position:relative}.container{max-width:490px;margin-left:auto;margin-right:auto;padding:0 10px;padding-bottom:37px}.mobile-event-container{max-width:390px;width:100%;padding-top:11px;gap:16px;display:flex;align-items:center;margin:0 auto 16px;justify-content:center}.mobile-event-info{display:flex;align-items:center;gap:3px;border:1px solid #685031;border-radius:28px;padding:7px 14px 8px 14px;background-color:white}.mobile-event-date{font-family:Gogh, sans-serif;line-height:100%;letter-spacing:-2%;margin-top:2px;font-size:18px}.mobile-main-title{font-family:"Big Shoulders Display" , sans-serif;font-weight:800;font-size:clamp(28px, 8.7vw, 42px);line-height:140%;text-align:center;text-transform:uppercase;margin-bottom:4px}.mobile-main-title span{color:#674529}.mobile-main-box{padding:7px 20px 6px 21px;border-radius:15px;background-color:white;border:1px solid #685031;max-width:314px;width:100%;margin-left:auto;margin-right:auto;display:flex;align-items:center;justify-content:center;margin-bottom:20px}.mobile-main-text{font-family:Poppins, sans-serif;font-weight:600;font-size:clamp(16px, 5vw, 18px);line-height:100%;color:#071209;text-align:center}.mobile-content-img{width:100%;min-height:320px;position:relative;display:flex;flex-direction:column;margin:auto}.mobile-hero-image{margin:0 auto;position:relative;z-index:2;height:auto;max-width:clamp(300px, 93vw, 369px);margin-bottom:-10px}.gift{display:flex;align-items:center;gap:9px;padding:12px 28px 12px 13px;border:1px solid #674529;box-shadow:0px 4px 0px 0px #674529;border-radius:50px;background-color:white;justify-content:center;margin-left:auto;margin-bottom:32px;margin-right:auto;max-width:346px;width:100%}.gift__info h3{font-family:Inter, sans-serif;font-weight:700;font-size:clamp(14.5px, 4.6vw, 18px);line-height:102%;margin-bottom:4px}.gift__info p{font-family:"SF Pro Display" , sans-serif;font-weight:400;font-size:clamp(12px, 3.5vw, 15px);line-height:130%}.mobile-cta-button{text-decoration:none;font-family:Poppins, sans-serif;padding:32px 0;background:radial-gradient(35.48% 57.87% at 50% 100%, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 100%), linear-gradient(90deg, #674529 15.87%, #885A35 52.4%, #674529 100%);box-shadow:0px 5px 4px 0px #FFFFFF57 inset, 0px 5px 0px 0px #49321E;font-size:30px;height:100px;font-weight:700;color:#fff;position:relative;z-index:10;border:none;border-radius:20px;width:100%;max-width:391px;margin:auto;margin-bottom:24px;display:flex;align-items:center;justify-content:center;text-transform:uppercase;cursor:pointer}@media (max-width:500px){.mobile-event-container{transform:scale(.9);margin-bottom:10px;padding-top:15px}.mobile-cta-button{font-size:23px}}@media (max-width:350px){.mobile-event-container{margin-bottom:5px}.mobile-cta-button{max-width:300px;font-size:22px}.mobile-event-date{font-size:14px}.mobile-main-box{max-width:275px}}
